name: release workflow

on:
  push:
    branches: [main]

env:
  BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}

jobs:
  get_config_values:
    uses: NHSDigital/eps-common-workflows/.github/workflows/get-repo-config.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    with:
      verify_published_from_main_image: true

  quality_checks:
    needs: [get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks-devcontainer.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  get_commit_id:
    runs-on: ubuntu-22.04
    outputs:
      commit_id: ${{ steps.commit_id.outputs.commit_id }}
    steps:
      - name: Get Commit ID
        id: commit_id
        run: |
          echo "commit_id=${{ github.sha }}" >> "$GITHUB_OUTPUT"
  tag_release:
    needs: [quality_checks, get_commit_id, get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release-devcontainer.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    permissions:
      id-token: write
      contents: write
    with:
      dry_run: false
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      branch_name: main
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}
    secrets: inherit
  generate_behave_steps_catalog:
    needs: [quality_checks, get_config_values]
    runs-on: ubuntu-22.04
    container:
      image: ${{ needs.get_config_values.outputs.pinned_image }}
      options: --user 1001:1001 --group-add 128
    defaults:
      run:
        shell: bash
    steps:
      - name: copy .tool-versions
        run: |
          cp /home/vscode/.tool-versions "$HOME/.tool-versions"
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Cache Virtualenv
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb
        id: cache-venv
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('pyproject.toml') }}

      - name: Install python packages
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: make install

      - name: Generate Behave steps catalog as HTML
        run: |
          set +H  # Disable history expansion to prevent !DOCTYPE error
          mkdir -p docs
          {
          echo "<!DOCTYPE html>"
          echo "<html lang='en'>"
          echo "<head>"
          echo "  <meta charset='UTF-8'>"
          echo "  <meta name='viewport' content='width=device-width, initial-scale=1.0'>"
          echo "  <title>Behave Steps Catalog</title>"
          echo "  <style>"
          echo "    body { font-family: 'Courier New', monospace; background-color: #f4f4f4; padding: 2rem; }"
          echo "    pre { background:
          white; border: 1px solid #ccc; padding: 1rem; overflow-x: auto; }"
          echo "    h1 { font-family: sans-serif; }"
          echo "  </style>"
          echo "</head>"
          echo "<body>"
          echo "  <h1>Behave Steps Catalog</h1>"
          echo "  <pre>"
          # Escape HTML special characters to ensure valid output
          poetry run behave --steps-catalog | python -c "import sys, html; print(html.escape(sys.stdin.read()))"
          echo "  </pre>"
          echo "</body>"
          echo "</html>"
          } > docs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages # Change if using another branch
